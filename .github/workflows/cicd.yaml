name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/muhammad-31/jerney-backend
  FRONTEND_IMAGE: ghcr.io/muhammad-31/jerney-frontend

jobs:
  # stage 1 - lint both frontend and backend before anything else
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - working-directory: ${{ matrix.component }}
        run: npm run lint

  # stage 2 - check npm dependencies for known vulnerabilities
  sca:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - working-directory: ${{ matrix.component }}
        run: npm ci

      - working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # stage 3 - scan terraform and k8s manifests for misconfigurations
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_39,CKV_AWS_58
          output_format: cli

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s_manifest/
          framework: kubernetes
          soft_fail: true
          output_format: cli

  # stage 4 - build images and push to ghcr, skipped on pull requests
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/muhammad-31/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # stage 5 - trivy scans the built images for OS and library CVEs
  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t jerney-${{ matrix.component }}:scan ./${{ matrix.component }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: jerney-${{ matrix.component }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  # stage 6 - hadolint checks dockerfiles for best practice violations
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # stage 7 - update image tags in k8s manifests after all scans pass
  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [image-scan, dockerfile-lint, iac-scan]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - run: |
          TAG=${{ steps.sha.outputs.short }}
          sed -i "s|image: .*jerney-backend.*|image: ghcr.io/muhammad-31/jerney-backend:${TAG}|" k8s_manifest/04-backend/deployment.yaml
          sed -i "s|image: .*jerney-frontend.*|image: ghcr.io/muhammad-31/jerney-frontend:${TAG}|" k8s_manifest/05-frontend/deployment.yaml

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s_manifest/
          git diff --cached --quiet || git commit -m "update images"
          git push
